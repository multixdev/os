<!DOCTYPE html>
<html lang="uk" data-theme="silicone">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0B" id="meta-theme-color">
    <title>MULTIX Code</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <div class="brand">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect x="18" y="18" width="64" height="64" transform="rotate(45 50 50)" class="logo-rhombus"/>
                <rect x="36" y="36" width="28" height="28" class="logo-square"/>
            </svg>
            <span>MULTIX</span>
        </div>
        <div class="actions">
            <span class="btn" style="cursor: default;">Theme: Silicone (Auto)</span>
            <button class="btn outline-green" id="sync-btn">Sync: Офлайн</button>
        </div>
    </header>

    <main>
        <aside>
            <div class="panel-header">Operation Space</div>
            <ul class="file-tree" id="vfs-tree">
                <li class="file-item active">welcome.md</li>
            </ul>
        </aside>
        
        <div class="editor-container">
            <div class="editor-tabs">
                <div class="tab active">welcome.md</div>
            </div>
            <textarea class="editor-textarea" spellcheck="false" id="main-editor">
# Вітаємо в MULTIX Code
Система готова до роботи в офлайн-режимі.
Service Worker активовано.</textarea>
        </div>
    </main>

    <script src="/app.js"></script>
</body>
</html>
